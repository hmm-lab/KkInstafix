name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          BOT_TOKEN: ci-token-not-used
        run: pytest test_bot.py -q

      - name: Provider checker smoke test (build URLs, no network)
        run: python -c "import tools.check_providers as c; assert len(list(c.build_check_urls())) > 0; print('check_providers OK')"
